<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emoji Physics</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #dock {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        z-index: 100;
        user-select: none;
      }

      .dock-item {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        font-size: 32px;
        cursor: pointer;
        transition: transform 0.2s ease;
        border-radius: 12px;
      }

      .dock-item:hover {
        transform: scale(1.4) translateY(-8px);
      }

      .dock-item.active {
        background: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="dock"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
