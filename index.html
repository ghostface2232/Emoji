<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emoji Physics</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #dock {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        z-index: 100;
        user-select: none;
      }

      #scene-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transform: translateY(8px) scale(0.985);
        transition:
          opacity 0.34s ease,
          transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 90;
      }

      #scene-loading.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .scene-loading__inner {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        color: rgba(255, 255, 255, 0.88);
        font: 600 13px/1.1 "SF Pro Display", "Segoe UI", sans-serif;
        letter-spacing: 0.04em;
      }

      .scene-loading__emoji {
        font-size: 22px;
        animation: scene-loading-float 0.9s ease-in-out infinite alternate;
      }

      .scene-loading__label {
        text-transform: uppercase;
      }

      @keyframes scene-loading-float {
        from { transform: translateY(0) scale(0.98); }
        to { transform: translateY(-4px) scale(1.04); }
      }

      .dock-item {
        --dock-scale: 1;
        --dock-lift: 0px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        font-size: 32px;
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        transform: translateY(calc(-2px + var(--dock-lift))) scale(var(--dock-scale));
        transition:
          transform 0.16s ease,
          filter 0.28s ease,
          color 0.28s ease;
        transform-origin: center bottom;
        will-change: transform;
        border-radius: 12px;
        isolation: isolate;
      }

      .dock-item::before {
        content: "";
        position: absolute;
        inset: 1px -2px 2px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.24) 55%, rgba(255, 255, 255, 0.06) 72%, transparent 84%);
        opacity: 0;
        filter: blur(10px);
        transform: scale(0.78);
        transition:
          opacity 0.28s ease,
          transform 0.34s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: -1;
      }

      .dock-item::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -6px;
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        opacity: 0;
        transform: translateX(-50%) scale(0.4);
        transition:
          opacity 0.22s ease,
          transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .dock-item.active {
        color: #fff;
      }

      .dock-item.active::before {
        opacity: 1;
        transform: scale(1);
      }

      .dock-item.active::after {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="scene-loading"></div>
    <div id="dock"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
